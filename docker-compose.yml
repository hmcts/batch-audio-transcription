version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: transcription_svc
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass  # pragma: allowlist secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d transcription_svc"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_CONNECTION_STRING=postgresql://dev:devpass@postgres:5432/transcription_svc
      - ENVIRONMENT=local
      - UVICORN_PORT=8001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_INTERNAL_URL=http://api:8001
      - TRANSCRIPTION_API_KEY=${LOCAL_API_KEY:-local-dev-key-change-me}
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - BACKEND_INTERNAL_URL=http://api:8001
      - TRANSCRIPTION_API_KEY=${LOCAL_API_KEY:-local-dev-key-change-me}
    depends_on:
      - api
    networks:
      - app-network
    profiles:
      - frontend-dev

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
