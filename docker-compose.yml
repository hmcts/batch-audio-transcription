version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: transcription_svc
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass  # pragma: allowlist secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d transcription_svc"]
      interval: 10s
      timeout: 5s
      retries: 5

  transcription-svc:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DATABASE_CONNECTION_STRING=postgresql://dev:devpass@postgres:5432/transcription_svc
      - ENVIRONMENT=local
    volumes:
      - ~/.azure:/root/.azure
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
