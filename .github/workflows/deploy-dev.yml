name: Deploy Dev

# Continuous delivery to the dev environment. Pull requests to main
# validate the Dockerfile (push: false). Pushes to main build and push
# to ACR, then push a `deploy-dev-<version>-<run_id>` git tag. The tag
# triggers `azure-infra-pipeline.yml` in ADO, which runs PrecheckDev
# then DeployDev (terraform apply + App Service restart).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: read
  actions: read

jobs:
  build:
    uses: ./.github/workflows/ci-build-image.yml
    secrets: inherit

  tag:
    needs: build
    if: needs.build.outputs.image_pushed == 'true'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Push deploy-dev-<version>-<run_id> tag
        env:
          VERSION: ${{ needs.build.outputs.version }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [[ -z "${VERSION}" ]]; then
            echo "No version output from build job" >&2
            exit 1
          fi
          TAG="deploy-dev-${VERSION}-${RUN_ID}"
          echo "Pushing deploy tag: ${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Deploy ${VERSION} to dev (run ${RUN_ID})"
          git push origin "${TAG}"

  # Post-deploy version-gated e2e check (DIAAT-241, supersedes the
  # health-only DIAAT-240 smoke wait). The deploy tag pushed by the `tag`
  # job triggers an asynchronous ADO pipeline (terraform apply + App
  # Service restart) that can take several minutes to bring the new
  # containers up.
  #
  # This job polls BOTH deployed-version endpoints until they report the
  # git SHA of the commit that triggered this deploy (github.sha), then —
  # and only then — runs the Playwright e2e suite against dev. Gating on
  # the version marker (rather than just health) removes the DIAAT-240
  # race where the OLD container is still healthy when polling starts: we
  # wait for the NEW build to actually be live before asserting anything.
  #
  # Any failure — version never matches within the timeout, or an e2e
  # failure — fails the workflow loudly so a broken deploy is caught here
  # rather than by a human hitting the app.
  #
  # It runs AFTER the tag is pushed and mirrors the `tag` job's gating
  # (only on real pushes to main that produced a pushed image). Because it
  # only runs on push to main, its logic can't execute in a PR — its first
  # real run is on the merge commit.
  e2e:
    needs: [build, tag]
    if: needs.build.outputs.image_pushed == 'true'
    runs-on: ubuntu-latest
    # Hard operational bound so the job can never hang for hours if the
    # poll loop ever regresses; comfortably above the initial delay, the
    # ~15 min version-poll budget, and the follow-on e2e run.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    env:
      API_VERSION_URL: https://hmcts-batch-transcription-dev.azurewebsites.net/api/v1/version
      FRONTEND_VERSION_URL: https://hmcts-batch-transcription-frontend-dev.azurewebsites.net/batch/api/version
      FRONTEND_BASE_URL: https://hmcts-batch-transcription-frontend-dev.azurewebsites.net
      # The expected deployed version: the full git SHA of the commit that
      # triggered this deploy. Baked into both images as GIT_SHA (see
      # ci-build-image.yml) so it compares equal end-to-end.
      EXPECTED_SHA: ${{ github.sha }}
      # Wait before the first poll to give the async ADO deploy + App
      # Service restart time to begin.
      INITIAL_DELAY_SECONDS: "60"
      # Total polling budget after the initial delay (~15 minutes).
      TIMEOUT_SECONDS: "900"
      # Delay between polls.
      INTERVAL_SECONDS: "20"
    steps:
      - uses: actions/checkout@v7

      - name: Wait for both dev endpoints to report the expected version
        run: |
          # -e so unexpected command failures (sleep/date/etc.) fail the
          # step fast; the curl `|| true` fallback below keeps expected
          # request failures from tripping it. The only arithmetic that
          # can evaluate to a non-zero exit is inside an `if`, so -e is
          # safe here.
          set -euo pipefail

          fetch_version() {
            # Echoes the reported version string, or empty if the request
            # failed / returned no parseable version. jq is preinstalled on
            # ubuntu-latest runners.
            curl -s --max-time 10 "$1" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true
          }

          echo "Expecting deployed version (github.sha): ${EXPECTED_SHA}"
          echo "Waiting ${INITIAL_DELAY_SECONDS}s for the ADO deploy + App Service restart to begin..."
          sleep "${INITIAL_DELAY_SECONDS}"

          deadline=$(( $(date +%s) + TIMEOUT_SECONDS ))
          api_version=""
          frontend_version=""

          while :; do
            api_version=$(fetch_version "${API_VERSION_URL}")
            frontend_version=$(fetch_version "${FRONTEND_VERSION_URL}")
            echo "$(date -u +%H:%M:%S) API='${api_version:-<none>}' frontend='${frontend_version:-<none>}' expected='${EXPECTED_SHA}'"

            if [[ "${api_version}" == "${EXPECTED_SHA}" && "${frontend_version}" == "${EXPECTED_SHA}" ]]; then
              echo "Both dev endpoints report the expected version. New build is live."
              exit 0
            fi

            if (( $(date +%s) >= deadline )); then
              echo "::error::Dev post-deploy version check timed out after ${TIMEOUT_SECONDS}s (plus ${INITIAL_DELAY_SECONDS}s initial delay); expected ${EXPECTED_SHA}."
              if [[ "${api_version}" != "${EXPECTED_SHA}" ]]; then
                echo "::error::API version endpoint never matched: ${API_VERSION_URL} (last: '${api_version:-<none>}')"
              fi
              if [[ "${frontend_version}" != "${EXPECTED_SHA}" ]]; then
                echo "::error::Frontend version endpoint never matched: ${FRONTEND_VERSION_URL} (last: '${frontend_version:-<none>}')"
              fi
              exit 1
            fi

            sleep "${INTERVAL_SECONDS}"
          done

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e against dev
        run: pnpm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.FRONTEND_BASE_URL }}
          # Dev has real jobs, so the empty-state dashboard test is not
          # applicable and skips itself (see dashboard.spec.ts). Feature
          # specs gated on E2E_*_JOB_ID skip without seeded data — seeding
          # dev for full feature coverage is a documented follow-up.
          E2E_EXPECT_EMPTY: "false"

      # Surface which e2e tests ran (passed/failed) vs skipped right on the job
      # page (DIAAT-241). Many feature specs are env-gated (E2E_*_JOB_ID) and
      # skip against dev; without this, ran-vs-skipped is invisible unless you
      # download the HTML report artifact. `if: always()` so skips AND failures
      # are summarised; the script never exits non-zero, so this step stays
      # informational and never changes the job's pass/fail (the e2e step above
      # gates red/green).
      - name: Summarise ran/skipped e2e tests
        if: always()
        run: node scripts/e2e-summary.mjs playwright-report/results.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-dev
          path: frontend/playwright-report/
          retention-days: 7
