name: CI Build Image

on:
  workflow_call:
    outputs:
      version:
        description: Computed artefact version for this run.
        value: ${{ jobs.version.outputs.version }}
      image_pushed:
        description: True only when the image was built and pushed to ACR.
        value: ${{ jobs.build.outputs.image_pushed }}

permissions:
  contents: read
  checks: read
  actions: read

env:
  ACR_NAME: hmctsprod.azurecr.io
  IMAGE_NAME: justiceaiunit/batch-audio-transcription

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pick.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # release event -> clean release version (e.g. 0.2.0)
      # everything else (push/pull_request) -> draft version with sha suffix
      - id: artefact
        uses: hmcts/artefact-version-action@v1
        with:
          release: ${{ github.event_name == 'release' }}

      - id: pick
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ steps.artefact.outputs.release_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.artefact.outputs.draft_version }}" >> "$GITHUB_OUTPUT"
          fi

      - run: echo "::notice title=Artefact Version::${{ steps.pick.outputs.version }}"

      - name: Generate CHANGELOG (release)
        if: github.event_name == 'release'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --output CHANGELOG.md

      - name: Write draft CHANGELOG placeholder
        if: github.event_name != 'release'
        env:
          VERSION: ${{ steps.pick.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          cat > CHANGELOG.md <<EOF
          # Draft build ${VERSION}

          This image was built from a non-release event (\`${EVENT_NAME}\`).
          For the canonical changelog, see the latest published release on GitHub.
          EOF

      - name: Upload CHANGELOG artefact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md
          if-no-files-found: error
          retention-days: 7

  # Images are only built and pushed on push/release/workflow_dispatch.
  # PR builds are skipped to keep PR cycle time short. Accepted risk:
  # a broken Dockerfile will only be caught after merge to main (where
  # the push build will fail before the deploy tag is created, so no
  # bad image reaches ACR or any environment).
  build:
    needs: version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_pushed: ${{ steps.result.outputs.image_pushed }}
    steps:
      - uses: actions/checkout@v4

      - name: Download CHANGELOG artefact
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: .

      - name: Build and push image
        # TODO: pin to a full commit SHA for supply-chain safety.
        # Run: git ls-remote https://github.com/hmcts/cnp-githubactions-library HEAD
        # then replace @main with @<40-char-sha>
        uses: hmcts/cnp-githubactions-library/container-build-push@main
        with:
          registry: ${{ env.ACR_NAME }}
          registry-username: ${{ secrets.HMCTSPROD_REGISTRY_USERNAME }}
          registry-password: ${{ secrets.HMCTSPROD_REGISTRY_PASSWORD }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.version.outputs.version }}
          context: .
          dockerfile: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}

      - id: result
        run: echo "image_pushed=true" >> "$GITHUB_OUTPUT"
