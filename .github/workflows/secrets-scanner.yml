name: Secrets Scanner
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 4' # Every Thursday at 04:00
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # gitleaks-action@v2 appends ^ to the PR base SHA unconditionally. When the
      # base IS the root commit of the repo, BASE^ does not exist and gitleaks
      # aborts. Inlining gitleaks with an explicit range avoids that edge case.
      - name: Gitleaks scanning
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before || '' }}"
          HEAD="${{ github.event.pull_request.head.sha || github.sha }}"
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -O /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          if [ -n "$BASE" ] && git rev-parse --quiet --verify "${BASE}^" >/dev/null 2>&1; then
            LOG_RANGE="${BASE}^..${HEAD}"
          elif [ -n "$BASE" ]; then
            LOG_RANGE="${BASE}..${HEAD}"
          else
            LOG_RANGE="$HEAD"
          fi
          /tmp/gitleaks detect --redact -v --exit-code=2 \
            --report-format=sarif --report-path=results.sarif \
            --log-opts="--no-merges --first-parent ${LOG_RANGE}"

      # hmcts/secrets-scanner@main runs TruffleHog with BASE^ (parent of the PR
      # base commit). For the first PR in a new repo the base IS the root commit,
      # so BASE^ does not exist and TruffleHog aborts. Inlining TruffleHog with
      # explicit base/head avoids that git edge case while keeping identical coverage.
      - name: TruffleHog scanning
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --results=verified
