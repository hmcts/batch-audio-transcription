name: Secrets Scanner

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 4' # Every Thursday at 04:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan for leaked secrets
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            # gitleaks-action@v2 uses BASE^..HEAD but BASE^ fails when BASE is the
            # repository's root commit (no parent). Fall back to BASE..HEAD so the
            # first-ever PR in a new repo does not produce a spurious git error.
            if git rev-parse --verify "${BASE}^" >/dev/null 2>&1; then
              LOG_OPTS="--no-merges --first-parent ${BASE}^..${HEAD}"
            else
              LOG_OPTS="--no-merges --first-parent ${BASE}..${HEAD}"
            fi
            gitleaks detect --redact --exit-code=2 \
              --report-format=sarif --report-path=results.sarif \
              --log-opts="$LOG_OPTS"
          else
            gitleaks detect --redact --exit-code=2 \
              --report-format=sarif --report-path=results.sarif
          fi

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results.sarif.zip
          path: results.sarif
          if-no-files-found: ignore

      - name: Install TruffleHog
        run: |
          curl -sSfL \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v3.88.12/trufflehog_3.88.12_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin trufflehog

      - name: TruffleHog scan
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            trufflehog git file://. --only-verified --fail \
              --since-commit="${{ github.event.pull_request.base.sha }}"
          else
            trufflehog git file://. --only-verified --fail
          fi
