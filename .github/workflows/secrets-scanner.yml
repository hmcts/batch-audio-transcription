name: Secrets Scanner

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 4' # Every Thursday at 04:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TODO: pin to a full commit SHA for supply-chain safety.
      # Run: git ls-remote https://github.com/hmcts/secrets-scanner HEAD
      # then replace @main with @<40-char-sha>
      - uses: hmcts/secrets-scanner@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks_license: ${{ secrets.GITLEAKS_LICENSE }}
